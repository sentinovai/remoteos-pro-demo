<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RemoteOS Pro Preview</title>
  <link rel="icon" href="../favicon.ico" sizes="any" />
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0b1220;color:#e8eef8}
    .wrap{max-width:1200px;margin:0 auto;padding:32px 20px 60px}
    .hero,.card{background:#131d31;border:1px solid #243653;border-radius:18px}
    .hero{padding:24px;margin-bottom:24px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .card{padding:14px}
    img{width:100%;display:block;border-radius:12px;border:1px solid #2a3f61}
    h1,h2,p{margin:0 0 12px}
    p{color:#aab7cf;line-height:1.6}
    a{color:#9ec3ff}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>RemoteOS Pro Preview</h1>
      <p>This folder contains real screenshots exported from the current RemoteOS Pro build. Open <a href="../index.html">the application</a> or review the screenshot set below.</p>
    </section>
    <section class="grid">
      <div class="card"><h2>Dashboard</h2><img src="../screenshots/01-dashboard-operations-hub.png" alt="Dashboard"></div>
      <div class="card"><h2>Task Board</h2><img src="../screenshots/02-task-board.png" alt="Task board"></div>
      <div class="card"><h2>Drag & Drop</h2><img src="../screenshots/03-drag-drop.png" alt="Drag and drop"></div>
      <div class="card"><h2>Delivery Review</h2><img src="../screenshots/04-delivery-review.png" alt="Delivery review"></div>
      <div class="card"><h2>Focus Workspace</h2><img src="../screenshots/05-focus-workspace.png" alt="Focus workspace"></div>
      <div class="card"><h2>Settings</h2><img src="../screenshots/06-settings.png" alt="Settings"></div>
      <div class="card"><h2>Clients</h2><img src="../screenshots/07-client-management.png" alt="Clients"></div>
      <div class="card"><h2>Activity Timeline</h2><img src="../screenshots/08-activity-timeline.png" alt="Activity timeline"></div>
      <div class="card"><h2>Dark Mode</h2><img src="../screenshots/09-dark-mode.png" alt="Dark mode"></div>
      <div class="card"><h2>Light Mode</h2><img src="../screenshots/10-light-mode.png" alt="Light mode"></div>
    </section>
  </div>
</body>
</html>
